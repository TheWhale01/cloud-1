services:
  wordpress:
    image: "wordpress"
    container_name: "wordpress"
    ports:
      - 80:80
      - 443:443
    env_file: ./.env/wordpress.env
    volumes:
      - wordpress:/var/www/html
    restart: unless-stopped
  phpmyadmin:
     image: "phpmyadmin"
     container_name: "phpmyadmin"
     env_file: ./.env/phpmyadmin.env
     restart: unless-stopped
  mysql:
     image: "mysql"
     container_name: "mysql"
     env_file: ./.env/mysql.env
     volumes:
       - mysql:/var/lib/mysql
     restart: unless-stopped

volumes:
  wordpress:
  mysql:
