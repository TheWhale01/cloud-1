services:
  traefik:
    image: traefik:v3
    container_name: traefik
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.duckdns.acme.email=hubretec@student.42.fr"
      - "--certificatesresolvers.duckdns.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.duckdns.acme.dnschallenge=true"
      - "--certificatesresolvers.duckdns.acme.dnschallenge.provider=duckdns"
    env_file: ./.env/traefik.env
  wordpress:
    image: wordpress
    container_name: wordpress
    env_file: ./.env/wordpress.env
    volumes:
      - wordpress:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloud1.rule=Host(`heuu.duckdns.org`)"
      - "traefik.http.routers.cloud1.entrypoints=websecure"
      - "traefik.http.services.cloud1.loadbalancer.server.port=80"
      - "traefik.http.routers.cloud1.tls=true"
      - "traefik.http.routers.cloud1.tls.certresolver=duckdns"
    restart: unless-stopped
  phpmyadmin:
     image: phpmyadmin
     container_name: phpmyadmin
     env_file: ./.env/phpmyadmin.env
     depends_on:
      - mysql
     restart: unless-stopped
  mysql:
     image: mysql:8.0
     container_name: mysql
     env_file: ./.env/mysql.env
     command: --skip-ssl
     volumes:
       - mysql:/var/lib/mysql
     restart: unless-stopped

  wordpress-cli:
    image: wordpress:cli
    depends_on:
      - wordpress
      - mysql
    env_file: ./.env/wordpress.env
    volumes:
      - wordpress:/var/www/html
    command:
      - sh
      - -c
      - |
        sleep 15;
        if ! wp core is-installed; then
          wp core install --url="http://wordpress" --title="Mon Blog" --admin_user="admin" --admin_password="motdepasse" --admin_email="moi@example.com" --locale="fr_FR" --skip-email
        fi
volumes:
  wordpress:
  mysql:
  traefik:
